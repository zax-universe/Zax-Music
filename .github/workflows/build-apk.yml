name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create root build.gradle.kts
        run: |
          cat > build.gradle.kts << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.5.0")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22")
                  classpath("com.google.dagger:hilt-android-gradle-plugin:2.51.1")
                  classpath("com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin:1.9.22-1.0.18")
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          
          tasks.register("clean", Delete::class) {
              delete(rootProject.buildDir)
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          org.gradle.daemon=true
          EOF

      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "Zax-Music"
          include ':app'
          EOF

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.useAndroidX=true \
            -Pandroid.enableJetifier=true \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musify-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
